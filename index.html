<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#ececea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Everyday Health">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Everyday Health</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --lime:#C8F24F; --lime-deep:#A6D62F;
  --bg:#EFEDE2; --surface:#F6F4EC; --surface-2:#ECE9DC; --inset:#EAE7DB;
  --line:#E3E0D3; --line-strong:#D6D2C4;
  --text:#1B1B14; --text-2:#6C6B5E; --text-3:#9B998D;
  --btn-bg:#17170F; --btn-text:#F4F2E7;
  --hero-bg:#16160F;
  --pink:#FF4D8D; --blue:#2F6BFF; --lilac:#CBB2F2; --peach:#F4C58C; --mint:#9DE9C6;
  --card-lilac:#EFE9FA; --card-peach:#FBF1E4; --card-lime:#C8F24F;
  --disp:'Poppins','Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  --ui:'Pretendard','Apple SD Gothic Neo','Malgun Gothic','Poppins',sans-serif;
  /* legacy vars referenced by inline JS styles */
  --white:var(--surface); --yellow:var(--lime); --amber:#E8F5B8; --ink:#1B1B14; --green:#34A06A; --red:#FF5566;
  --r:24px;
  --shadow:0 18px 40px -24px rgba(30,30,15,.35);
  --shadow-sm:0 2px 8px -3px rgba(30,30,15,.18);
  --outline:1.5px solid var(--line);
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#131310; --surface:#1F1F18; --surface-2:#26261E; --inset:#26261E;
    --line:#2E2E25; --line-strong:#3A3A30;
    --text:#F1EFE4; --text-2:#A9A79A; --text-3:#747266;
    --btn-bg:#C8F24F; --btn-text:#17170F;
    --amber:#3A3A1E;
    --card-lilac:#231F2E; --card-peach:#2A241B; --card-lime:#C8F24F;
    --ink:#F1EFE4;
    --shadow:0 18px 40px -24px rgba(0,0,0,.6);
    --shadow-sm:0 2px 8px -3px rgba(0,0,0,.4);
  }
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);
  font-family:var(--ui);font-size:16px;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.wrap{max-width:430px;margin:0 auto;padding:14px 14px 90px}
.hidden{display:none!important}

/* ===== HERO ===== */
.hd{position:relative;overflow:hidden;background:var(--hero-bg);color:#F4F2E7;
  border-radius:30px;padding:26px 24px 24px;margin-bottom:14px}
.hero-deco{position:absolute;inset:0;pointer-events:none}
.hero-deco .fl{position:absolute;top:-10px;right:14px}
.hero-deco .sp{position:absolute;top:64px;right:104px}
.hero-deco .ci{position:absolute;top:18px;right:128px;width:26px;height:26px;border-radius:50%;background:var(--peach)}
.hd-left{display:flex;flex-direction:column;gap:4px;position:relative;z-index:1}
.hd-sub{font-family:var(--disp);font-size:.66rem;font-weight:600;color:#A7A597;letter-spacing:.16em;text-transform:uppercase}
.hd h1{font-family:var(--disp);font-size:2.1rem;font-weight:800;letter-spacing:-.02em;line-height:1.0;color:#F4F2E7}
.hd h1 em{font-style:normal;color:var(--lime)}
.hero-foot{display:flex;align-items:center;gap:10px;margin-top:20px;position:relative;z-index:1}
.streak{font-family:var(--disp);background:var(--lime);color:#16160F;padding:9px 16px;border-radius:999px;
  font-size:.82rem;font-weight:700;letter-spacing:-.01em;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}

/* ===== CARD ===== */
.card{background:var(--surface);border:var(--outline);border-radius:var(--r);
  padding:18px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
.card-blue{background:var(--card-lime);border-color:transparent;
  --surface:#FBFBF4;--surface-2:#EEF6D2;--inset:#EEF6D2;--line:#B7D94E;--line-strong:#A6CE3C;
  --text:#16160F;--text-2:#42501C;--text-3:#5E6B33;--btn-bg:#17170F;--btn-text:#F4F2E7}
.card-pink{background:#CBB2F2;border-color:transparent;
  --surface:#FBFAF6;--surface-2:#E7DAF7;--inset:#E7DAF7;--line:#BBA0E8;--line-strong:#AE90E2;
  --text:#16160F;--text-2:#473863;--text-3:#5C4D78;--btn-bg:#17170F;--btn-text:#F4F2E7}
.card-lav{background:var(--card-lilac);border-color:transparent}
.card-sage{background:var(--surface)}
.card-peach{background:var(--card-peach);border-color:transparent;
  --surface:#FBFAF6;--surface-2:#F5E8D8;--inset:#F5E8D8;--line:#E8C898;--line-strong:#D8A870;
  --text:#16160F;--text-2:#6B4A20;--text-3:#8A6030}
.card-title{font-family:var(--disp);font-size:.82rem;font-weight:700;margin-bottom:14px;
  display:flex;align-items:center;gap:6px;letter-spacing:0;color:var(--text);text-transform:none}

/* ===== RECOMMENDATION ===== */
.rec-nav{display:flex;align-items:center;gap:6px;margin-bottom:12px}
.rec-day-label{display:none}
.rec-day-label .day-name{font-family:var(--disp);font-size:1.05rem;font-weight:800}
.rec-day-label .day-date{font-size:.8rem;color:var(--text-2);font-weight:600;margin-top:2px}
.rec-week{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;flex:1;min-width:0}
.rec-week-day{border:1.5px solid var(--line);background:var(--surface);color:var(--text-2);
  border-radius:11px;padding:6px 2px;font-size:.66rem;font-weight:800;font-family:var(--disp);
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0;position:relative}
.rec-week-day strong{display:block;font:inherit;color:inherit;line-height:1}
.rec-week-day span{font-size:.58rem;font-weight:700;color:var(--text-3);font-family:var(--ui)}
.rec-week-day.on{background:rgba(255,255,255,.9);color:#17170F;border-color:transparent}
.rec-week-day.on span{color:#17170F;opacity:.72}
.rec-week-day.on::after{content:'';position:absolute;left:50%;bottom:3px;transform:translateX(-50%);
  width:14px;height:3px;border-radius:999px;background:var(--pink)}
.rec-week-day.today{background:#17170F!important;color:#fff!important;border-color:transparent;box-shadow:none}
.rec-week-day.today span{color:#fff!important;opacity:.82}
.rec-week-day.today.on::after{background:var(--lime)}
.arr-btn{background:var(--surface);color:var(--text);border:var(--outline);
  width:34px;height:42px;border-radius:12px;cursor:pointer;font-size:1.1rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.arr-btn:active{opacity:.6;transform:scale(.93)}
.rec-badge{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;
  border-radius:999px;font-family:var(--disp);font-size:.9rem;font-weight:700;border:none;margin-bottom:10px}
.rec-reason{font-size:.84rem;color:var(--text-2);line-height:1.6;margin-bottom:8px;font-weight:500}
.rec-tip{font-size:.78rem;color:var(--text-2);margin-top:10px;line-height:1.6;
  background:var(--bg);border-radius:14px;padding:11px 13px;border:1px solid var(--line);font-weight:500}
/* 리스트형 운동 행 */
.ex-list-row{display:flex;align-items:center;gap:10px;padding:11px 14px;
  background:var(--surface);border:1.5px solid var(--line);border-radius:13px;
  margin-bottom:6px;cursor:pointer;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;transition:border-color .1s}
.ex-list-row:active{opacity:.7}
.ex-list-row.sel{border-color:var(--lime-deep);background:var(--amber)}
.ex-list-chk{width:22px;height:22px;border-radius:7px;border:1.25px solid #ececea;
  display:flex;align-items:center;justify-content:center;font-size:.78rem;
  flex-shrink:0;background:#fff;color:#17170F;font-weight:900;box-shadow:inset 0 0 0 2px rgba(255,255,255,.5)}
.ex-list-row.sel .ex-list-chk{background:#17170F;border-color:#ececea;color:#fff}
.ex-list-name{flex:1;font-size:.88rem;font-weight:600;color:var(--text)}
.ex-list-yt{padding:4px 9px;background:#FF3B3B;color:#fff;border-radius:7px;
  font-size:.56rem;font-weight:800;text-decoration:none;flex-shrink:0;line-height:1.5}
/* 부위 칩 */
.part-chips{display:flex;flex-wrap:nowrap;gap:4px;margin-bottom:10px;
  overflow:visible;padding-bottom:2px;scrollbar-width:none;justify-content:center}
.part-chips::-webkit-scrollbar{display:none}
.part-chip{padding:7px 9px;border-radius:20px;border:1.5px solid transparent;
  font-size:.7rem;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap;
  background:var(--surface);color:var(--text);touch-action:manipulation;flex:1 1 0;min-width:0}
.done-btn{width:100%;padding:15px;border-radius:16px;border:none;
  background:var(--btn-bg);color:var(--btn-text);font-family:var(--disp);font-size:.96rem;font-weight:700;
  cursor:pointer;margin-top:6px}
.done-btn:active{opacity:.85;transform:scale(.98)}
.done-btn.already{background:var(--btn-bg);color:var(--btn-text);border:1.5px solid transparent}
.done-btn.rest-day{background:var(--surface-2);color:var(--text-2)}

/* ===== CALENDAR ===== */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month{font-family:var(--disp);font-size:1.4rem;font-weight:800;letter-spacing:-.01em;color:var(--text);white-space:nowrap}
.nav-btns{display:flex;gap:6px}
.btn-nav{background:var(--surface);color:var(--text);border:var(--outline);
  width:36px;height:36px;border-radius:12px;cursor:pointer;font-size:.95rem;font-weight:700;
  display:flex;align-items:center;justify-content:center}
.btn-nav:active{opacity:.6}
.btn-today{width:auto;padding:0 14px;font-family:var(--disp);font-size:.78rem;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.dn{text-align:center;font-size:.66rem;font-weight:700;padding:2px 0 7px;color:var(--text-3)}
.dn:first-child{color:#FF7FA8} .dn:last-child{color:#7FA8E8}
.cal-day{background:transparent;border:1.5px solid transparent;border-radius:13px;
  padding:7px 2px 6px;min-height:50px;cursor:pointer;position:relative;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:3px;justify-content:flex-start}
.cal-day:active{transform:scale(.93)}
.cal-day.empty{background:transparent;cursor:default;border:none;pointer-events:none}
.cal-day.is-today{background:var(--lime);border-color:var(--lime)}
.cal-day.is-today .dn2{color:#16160F}
.cal-day.is-plan{background:var(--surface)}
.cal-day.is-plan-cardio{background:var(--surface)}
.cal-day.is-sun .dn2{color:#FF7FA8} .cal-day.is-sat .dn2{color:#7FA8E8}
.dn2{font-family:var(--disp);font-size:.84rem;font-weight:700;line-height:1;color:var(--text)}
.done-star{position:absolute;top:4px;right:5px;font-size:.62rem;font-weight:900;color:var(--lime-deep)}
.cal-day.is-today .done-star{color:#16160F}
.plan-lbl{font-size:.6rem;font-weight:700;color:var(--text-3);line-height:1;margin-top:1px}
.cal-day.has-entry{background:var(--surface);border-color:var(--line)}
.cal-bars{display:flex;flex-direction:column;gap:2.5px;width:64%;margin-top:2px}
.cal-bars i{height:4px;border-radius:3px;display:block;width:100%}
.cal-day.has-rest{background:var(--surface-2)!important;border-color:var(--line)!important}
.cal-day.has-rest .dn2{color:var(--text-3)}

/* legend */
.legend{display:flex;flex-wrap:wrap;gap:9px;margin-top:14px;padding-top:14px;border-top:1.5px dashed var(--line-strong)}
.leg{display:flex;align-items:center;gap:6px;font-size:.74rem;font-weight:600;color:var(--text-2)}
.leg-dot{width:16px;height:7px;border-radius:4px;border:none}

/* ===== STATS ===== */
.stats-nav{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.stats-months{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;flex:1}
.stat-month{background:var(--surface);border:var(--outline);border-radius:18px;
  padding:12px 9px;text-align:center}
.stat-month.current{background:var(--lime);border-color:var(--lime)}
.stat-m-name{font-family:var(--disp);font-size:.66rem;font-weight:700;margin-bottom:5px;color:var(--text-3)}
.stat-month.current .stat-m-name{color:#3F5212}
.stat-m-num{font-family:var(--disp);font-size:1.5rem;font-weight:800;line-height:1;color:var(--text)}
.stat-month.current .stat-m-num{color:#16160F}
.stat-m-unit{font-size:.62rem;font-weight:700;margin-left:1px;color:var(--text-3)}
.stat-month.current .stat-m-unit{color:#4A5A1E}
.stat-parts{margin-top:9px;display:flex;flex-direction:column;gap:5px;align-items:stretch;padding:0 2px}
.stat-part-row{display:flex;align-items:center;gap:6px}
.stat-part-dot{width:12px;height:6px;border-radius:3px;flex-shrink:0;border:none}
.stat-part-name{font-size:.72rem;font-weight:600;flex:1;text-align:left;color:var(--text-2)}
.stat-part-cnt{font-size:.72rem;font-weight:700;color:var(--text-3)}
.stat-month.current .stat-part-name{color:#2E3A12}
.stat-month.current .stat-part-cnt{color:#4A5A1E}
.stat-arr{background:var(--surface);color:var(--text);border:var(--outline);
  width:34px;height:34px;border-radius:12px;cursor:pointer;font-size:.95rem;
  font-weight:700;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.stat-arr:active{opacity:.6}

/* ===== MODAL ===== */
.overlay{position:fixed;inset:0;background:rgba(20,20,12,.5);
  display:flex;align-items:flex-end;justify-content:center;z-index:200;
  backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)}
.overlay.hidden{display:none}
.modal{background:var(--bg);border-radius:30px 30px 0 0;border:none;
  width:100%;max-width:430px;max-height:90vh;overflow-y:auto;padding:12px 18px 36px;
  box-shadow:0 -10px 40px rgba(0,0,0,.18)}
.modal-handle{width:42px;height:5px;background:var(--line-strong);border-radius:3px;margin:6px auto 18px}
.modal-title{font-family:var(--disp);font-size:1.25rem;font-weight:800;margin-bottom:18px;color:var(--text)}
.view-part-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;
  font-size:.8rem;font-weight:700;color:#fff;margin-right:6px;margin-bottom:8px}
.view-ex-row{padding:10px 12px;background:var(--surface);border:1.5px solid var(--line);
  border-radius:12px;margin-bottom:6px}
.view-ex-name{font-size:.88rem;font-weight:700;color:var(--text);margin-bottom:4px}
.view-ex-sets{font-size:.78rem;color:var(--text-2);font-weight:500;line-height:1.7}
.view-done{display:inline-flex;align-items:center;gap:5px;background:var(--lime);
  color:#16160F;padding:5px 12px;border-radius:20px;font-size:.78rem;font-weight:800;margin-bottom:12px}
.view-rest{display:inline-flex;align-items:center;background:var(--surface-2);
  color:var(--text-2);padding:5px 12px;border-radius:20px;font-size:.78rem;font-weight:700;margin-bottom:12px}
.field-lbl{display:block;font-family:var(--disp);font-size:.72rem;font-weight:700;color:var(--text-3);
  margin-bottom:9px;letter-spacing:.02em;text-transform:none}
.part-btns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.part-btn{padding:9px 16px;border-radius:14px;border:1.5px solid var(--line-strong);
  background:var(--surface);color:var(--text-2);cursor:pointer;font-size:.84rem;font-weight:700}
.part-btn:active{transform:scale(.95)}
.part-btn.on{border-color:transparent}
.ex-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  margin-bottom:14px;padding:2px}
.ex-card{border:1.5px solid var(--line);border-radius:16px;overflow:hidden;
  background:var(--surface);position:relative;cursor:pointer;display:flex;flex-direction:column;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.ex-card:active{transform:scale(.94)}
.ex-card.selected{border-color:var(--lime-deep)}
.ex-card.selected .ex-name-bar{background:var(--lime);color:#16160F}
.ex-card.selected .sel-mk{display:flex}
.ex-img-box{flex:1;min-height:60px;background:var(--inset);display:flex;align-items:center;justify-content:center;overflow:hidden}
.ex-img-box img{width:100%;height:100%;object-fit:cover;object-position:top}
.ex-name-bar{padding:6px 3px;font-size:.62rem;font-weight:600;text-align:center;
  line-height:1.3;background:var(--surface);min-height:28px;
  display:flex;align-items:center;justify-content:center;color:var(--text)}
.yt-lnk{position:absolute;top:5px;right:5px;background:#FF3B3B;
  color:#fff;border-radius:7px;padding:3px 6px;font-size:.5rem;font-weight:800;
  text-decoration:none;line-height:1.4;z-index:2}
.sel-mk{position:absolute;top:5px;left:5px;width:20px;height:20px;
  background:var(--btn-bg);border-radius:7px;color:var(--btn-text);
  font-size:.68rem;font-weight:900;display:none;align-items:center;justify-content:center;z-index:2}
.ex-empty{padding:16px;font-size:.84rem;color:var(--text-3);font-weight:600;text-align:center;
  border:1.5px dashed var(--line-strong);border-radius:16px;margin-bottom:14px}

/* search */
.ex-search-wrap{position:relative;margin-bottom:10px}
.ex-search-inp{width:100%;background:var(--inset);border:var(--outline);border-radius:13px;
  padding:11px 13px 11px 40px;color:var(--text);font-size:.9rem;outline:none;font-weight:600;font-family:inherit}
.ex-search-inp:focus{background:var(--surface);border-color:var(--lime-deep)}
.ex-search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:.95rem;pointer-events:none}
.ex-search-results{background:var(--surface);border:var(--outline);border-radius:13px;
  overflow-y:auto;max-height:180px;margin-bottom:10px;scrollbar-width:thin;
  scrollbar-color:var(--line-strong) transparent}
.ex-search-results::-webkit-scrollbar{width:5px}
.ex-search-results::-webkit-scrollbar-track{background:transparent}
.ex-search-results::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:999px}
.ex-search-row{display:flex;align-items:center;gap:9px;padding:10px 13px;
  cursor:pointer;border-bottom:1.5px solid var(--line)}
.ex-search-row:last-child{border-bottom:none}
.ex-search-row:active{background:var(--inset)}
.ex-search-part{font-size:.66rem;font-weight:800;color:#fff;padding:3px 9px;
  border-radius:999px;flex-shrink:0;white-space:nowrap}
.ex-search-name{font-size:.84rem;font-weight:700;color:var(--text)}
.ex-search-empty{padding:14px;text-align:center;font-size:.82rem;color:var(--text-3);font-weight:600}

/* per-ex sets */
.ex-sets-list{margin-bottom:14px}
.ex-sets-hd{font-family:var(--disp);font-size:.72rem;font-weight:700;color:var(--text-3);
  margin-bottom:8px}
.ex-sets-row{display:flex;align-items:center;gap:9px;padding:12px 13px;
  background:var(--surface);border:1.5px solid var(--line);border-radius:15px;
  margin-bottom:7px;cursor:pointer}
.ex-sets-row:active{background:var(--inset)}
.ex-sets-name{font-size:.84rem;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.ex-sets-val{font-size:.7rem;font-weight:600;color:var(--text-2);line-height:1.5}
.ex-sets-val.unset{color:var(--text-3);font-size:.76rem}
.ex-sets-ico{font-size:.85rem;color:var(--text-3);flex-shrink:0}

/* drum sets */
/* ── set text inputs ── */
/* multi-row set input */
.ex-sets-mr{background:var(--surface);border:1.5px solid var(--line);
  border-radius:14px;padding:9px 11px;margin-bottom:7px}
.ex-sets-mr-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.ex-sets-mr-name{font-size:.75rem;font-weight:700;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.ex-sets-mr-close{background:none;border:none;padding:0 0 0 6px;cursor:pointer;
  color:var(--text-3);font-size:1.1rem;line-height:1;flex-shrink:0}
.ex-sets-mr-close:active{color:var(--text)}
/* 2열 세트 그리드 */
.ex-sets-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px}
.ex-set-cell{display:flex;align-items:center;gap:3px;background:var(--bg);
  border:1.5px solid var(--line);border-radius:10px;padding:5px 6px;transition:opacity .15s}
.ex-set-cell.empty{opacity:.38}
.ex-set-cell:focus-within{border-color:var(--lime-deep);opacity:1!important}
.ex-set-num{font-size:.58rem;font-weight:800;color:var(--text-3);min-width:12px;flex-shrink:0}
.ex-inp-sm{width:0;flex:1;min-width:0;text-align:right;background:transparent;border:none;
  padding:0 1px;font-size:.8rem;font-weight:700;
  color:var(--text);font-family:inherit;outline:none;-webkit-appearance:none}
.ex-inp-sm::placeholder{color:var(--text-3);font-weight:400;font-size:.72rem}
.ex-inp-sm:placeholder-shown{font-weight:400}
.ex-unit{font-size:.62rem;font-weight:600;color:var(--text-3);flex-shrink:0;min-width:10px}
.ex-sets-sep{font-size:.62rem;color:var(--line-strong);font-weight:500;flex-shrink:0}
.ex-sets-add{background:none;border:1.5px dashed var(--line-strong);color:var(--text-3);
  border-radius:8px;padding:5px 0;font-size:.7rem;font-weight:700;cursor:pointer;
  font-family:inherit;width:100%;margin-top:2px}
.ex-sets-add:active{background:var(--inset)}
/* rec part section */
.rec-part-hd{font-size:.72rem;font-weight:800;color:var(--text-2);
  padding:10px 0 5px;display:flex;align-items:center;gap:6px}
.rec-part-hd .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.rec-part-divider{border:none;border-top:1.5px dashed var(--line-strong);margin:8px 0}
/* 운동목록 스크롤 */
.ex-list-scroll{max-height:232px;overflow-y:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:thin;scrollbar-color:var(--line-strong) transparent;padding-right:4px}
.ex-list-scroll::-webkit-scrollbar{width:5px}
.ex-list-scroll::-webkit-scrollbar-track{background:transparent}
.ex-list-scroll::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:999px}
.rec-ex-list-scroll{max-height:152px;overscroll-behavior:contain;margin-bottom:12px}
.card-blue .rec-ex-list-scroll{
  max-height:174px!important;
  overflow-y:auto!important;
  overscroll-behavior:contain;
}
.card-blue .rec-ex-list-scroll .ex-list-row,
.card-blue .rec-search-results-scroll .ex-mgmt-row{
  min-height:52px;
}
.rec-search-results-scroll{
  max-height:174px;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  padding-right:4px;
  margin:4px 0 12px;
  scrollbar-width:thin;
  scrollbar-color:var(--line-strong) transparent;
}
.rec-search-results-scroll::-webkit-scrollbar{width:5px}
.rec-search-results-scroll::-webkit-scrollbar-track{background:transparent}
.rec-search-results-scroll::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:999px}
.view-ex-list-full{max-height:none;overflow:visible;padding-right:0}
/* 추천탭 검색 */
.rec-search-wrap{position:relative;margin-bottom:10px}
.rec-search-inp{width:100%;background:var(--inset);border:var(--outline);border-radius:12px;
  padding:10px 12px 10px 36px;font-size:.86rem;color:var(--text);outline:none;
  font-family:inherit;font-weight:500}
.rec-search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);
  font-size:.9rem;pointer-events:none;color:var(--text-3)}
.prev-load-btn{width:100%;padding:11px 13px;border-radius:13px;border:1.5px dashed var(--line-strong);
  background:var(--surface);color:var(--text-2);font-size:.82rem;font-weight:700;cursor:pointer;
  font-family:inherit;margin:-4px 0 14px;display:flex;align-items:center;justify-content:center;gap:6px}
.prev-load-btn.loaded{background:var(--amber);color:var(--text);border-color:var(--lime-deep)}
.prev-load-empty{font-size:.8rem;font-weight:700;color:var(--text-3);text-align:center;
  padding:10px 12px;border:1.5px dashed var(--line);border-radius:13px;margin:-4px 0 14px}
/* 운동 관리 카드 */
.ex-mgmt-row{display:flex;align-items:center;gap:8px;padding:9px 12px;
  background:var(--surface);border:1.5px solid var(--line);border-radius:12px;margin-bottom:6px}
.ex-mgmt-name{flex:1;font-size:.86rem;font-weight:600;color:var(--text)}
.ex-mgmt-part{font-size:.66rem;font-weight:700;padding:3px 8px;border-radius:10px;color:#fff}
.ex-mgmt-del{background:none;border:none;color:var(--text-3);cursor:pointer;font-size:.9rem;padding:2px 4px}
.ex-mgmt-del:active{color:var(--red)}
.ex-mgmt-add{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;align-items:stretch}
.ex-mgmt-add input{flex:1 1 100%;min-width:0;background:var(--inset);border:var(--outline);border-radius:12px;
  padding:10px 12px;font-size:.86rem;color:var(--text);outline:none;font-family:inherit}
.ex-mgmt-add select{flex:1 1 0;min-width:0;background:var(--inset);border:var(--outline);border-radius:12px;
  padding:10px 8px;font-size:.82rem;color:var(--text);outline:none;font-family:inherit}
.ex-mgmt-add .btn-add{flex:0 0 auto;padding:10px 20px;border-radius:12px;border:none;
  background:var(--btn-bg);color:var(--btn-text);font-size:.82rem;font-weight:700;
  cursor:pointer;font-family:inherit;white-space:nowrap}
/* rec card selected */
.rec-card.rec-selected{border-color:var(--lime-deep)!important;
  box-shadow:0 0 0 3px var(--lime),0 4px 16px rgba(180,220,40,.35);
  transform:scale(1.04);transition:transform .15s,box-shadow .15s}
.rec-card.rec-selected .rec-name{background:var(--lime);color:#16160F;font-weight:700}
.rec-card.rec-selected .rec-img::after{content:'✓';position:absolute;
  top:6px;left:6px;width:22px;height:22px;background:#A6D62F;border-radius:50%;
  color:#16160F;font-size:.78rem;font-weight:900;display:flex;align-items:center;
  justify-content:center;line-height:22px;text-align:center;z-index:3;
  box-shadow:0 2px 6px rgba(0,0,0,.2)}
.rec-img{position:relative}

.custom-inp{width:100%;background:var(--inset);border:var(--outline);border-radius:14px;
  padding:13px 14px;color:var(--text);font-size:.9rem;outline:none;margin-bottom:14px;
  font-weight:600;font-family:inherit}
.custom-inp:focus{background:var(--surface);border-color:var(--lime-deep)}
.toggle-row{display:flex;align-items:center;gap:11px;margin-bottom:20px}
.tog{position:relative;width:48px;height:27px;flex-shrink:0}
.tog input{display:none}
.tog-sl{position:absolute;inset:0;background:var(--line-strong);border-radius:14px;cursor:pointer;transition:.2s}
.tog-sl::after{content:'';position:absolute;width:21px;height:21px;background:#fff;
  border-radius:50%;top:3px;left:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog input:checked+.tog-sl{background:var(--lime-deep)}
.tog input:checked+.tog-sl::after{transform:translateX(21px)}
.modal-actions{display:flex;gap:9px}
.btn{flex:1;padding:15px;border-radius:16px;border:none;cursor:pointer;
  font-family:var(--disp);font-size:.92rem;font-weight:700}
.btn:active{transform:scale(.97);opacity:.9}
.btn-primary{background:var(--btn-bg);color:var(--btn-text)}
.btn-ghost{background:var(--surface-2);color:var(--text-2)}
.btn-del{background:rgba(255,77,141,.16);color:var(--pink)}

/* Soft surface pass: reduce line-heavy UI in favor of clean filled shapes */
.card{border:none;box-shadow:none}
.arr-btn,.btn-nav,.stat-arr{border:none;background:rgba(255,255,255,.52)}
.card-blue .arr-btn,.card-blue .rec-week-day,.card-blue .rec-search-inp,
.card-blue .ex-list-row,.card-blue .prev-load-btn{background:rgba(255,255,255,.72)}
.rec-week-day{border:none}
.rec-week-day.on,.rec-week-day.today{box-shadow:none}
.ex-list-row,.view-ex-row,.ex-sets-mr,.ex-set-cell,.ex-search-results,
.ex-search-inp,.rec-search-inp,.custom-inp,.ex-mgmt-row,.stat-month,
.part-btn,.prev-load-btn,.prev-load-empty{border:none}
.ex-list-row,.view-ex-row,.ex-sets-mr,.ex-search-results,.ex-mgmt-row,
.stat-month,.part-btn,.prev-load-btn,.prev-load-empty{box-shadow:none}
.ex-list-row{background:rgba(255,255,255,.7)}
.ex-list-row.sel{background:var(--amber);box-shadow:inset 0 0 0 2px var(--lime-deep)}
.cal-day.is-plan,.cal-day.is-plan-cardio{border:none;background:#FFF6B8}
.cal-day.has-entry{border:none;background:#DDF77A}
.cal-day.has-entry .dn2{color:#17170F}
.cal-day.has-entry .plan-lbl{color:#445718}
.cal-bars{width:72%;gap:3px}
.cal-bars i{height:5px;box-shadow:0 1px 0 rgba(255,255,255,.45)}
.cal-day.is-today{border:none;background:#17170F}
.cal-day.is-today .dn2{color:#fff}
.cal-day.is-today.has-entry{background:#DDF77A;box-shadow:inset 0 0 0 2px #17170F}
.cal-day.is-today.has-entry .dn2{color:#17170F}
.cal-day.is-today.is-plan,.cal-day.is-today.is-plan-cardio{background:#FFF6B8;box-shadow:inset 0 0 0 2px #17170F}
.cal-day.is-today.is-plan .dn2,.cal-day.is-today.is-plan-cardio .dn2{color:#17170F}
.cal-day.has-rest{border:none!important}
.legend{border-top:none;padding-top:8px}
.rec-part-divider{border-top:none;height:8px;margin:6px 0;background:rgba(255,255,255,.38);border-radius:999px}
.ex-search-row{border-bottom:none}
.ex-search-row+.ex-search-row{box-shadow:inset 0 1px rgba(0,0,0,.04)}
.ex-set-cell:focus-within,.ex-search-inp:focus,.rec-search-inp:focus,.custom-inp:focus{
  box-shadow:inset 0 0 0 2px var(--lime-deep);border:none}
.calendar-card{background:#fff}
.calendar-card .btn-nav,
.calendar-card .cal-day.has-rest{background:#F2F2EA}
.card-peach .ex-mgmt-row,
.card-peach .rec-search-inp,
.card-peach .ex-mgmt-add input,
.card-peach .ex-mgmt-add select{background:#fff}

/* Reference-inspired visual pass: bold black/lime surfaces, pastel blocks, minimal lines */
:root{

  --surface-2:#F0EFE6;
  --inset:#F0EFE6;
  --line:#E7E5DA;
  --line-strong:#D8D5C8;
  --card-peach:#FBFAF4;
  --card-lilac:#E7D8FF;
  --shadow-sm:0 18px 34px -28px rgba(23,23,15,.35);
}
.wrap{padding:18px 14px 96px}
.hd{border-radius:34px;padding:30px 26px 26px;min-height:210px}
.hd h1{font-size:2.35rem;line-height:1.06}

.rec-week{gap:5px}
.rec-week-day{border-radius:14px;background:rgba(255,255,255,.62);padding:7px 2px}
.rec-week-day.on{background:#fff}
.rec-week-day.today{background:#17170F!important;color:#fff!important}
.rec-week-day.on::after{bottom:3px;height:3px}
.rec-search-inp,.ex-search-inp,.custom-inp,
.ex-mgmt-add input,.ex-mgmt-add select{background:#fff;border-radius:17px}
.ex-list-row,.view-ex-row,.ex-mgmt-row{border-radius:18px;background:#fff;padding:13px 15px}
.card-blue .ex-list-row,.card-blue .rec-search-inp,.card-blue .prev-load-btn{background:rgba(255,255,255,.78)}

.done-btn{position:relative;min-height:58px;border-radius:22px;background:#E6E6D8;color:#17170F;

.done-btn::before{content:'✓';position:absolute;left:8px;top:8px;bottom:8px;width:48px;border-radius:17px;

.done-btn.already{background:#17170F;color:#fff}
.done-btn.rest-day{background:#E6E6D8;color:#17170F}
.btn{border-radius:20px}
.calendar-card{background:#fff;border-radius:30px}

<script>
// ── SVG 일러스트 시스템 ──
// 귀여운 스틱피겨 포즈별 SVG
const _C='#5A4A3A',_S='#FFD9B0'; // skin/outline
function _face(cx,cy){return `<circle cx="${cx}" cy="${cy}" r="7.5" fill="${_S}" stroke="${_C}" stroke-width="1.5"/><circle cx="${cx-2.5}" cy="${cy-.5}" r="1.1" fill="${_C}"/><circle cx="${cx+2.5}" cy="${cy-.5}" r="1.1" fill="${_C}"/><path d="M${cx-2.5} ${cy+3} Q${cx} ${cy+5.5} ${cx+2.5} ${cy+3}" stroke="${_C}" stroke-width="1.1" fill="none" stroke-linecap="round"/>`;}
function _body(cx,bg,lc){return `<line x1="${cx}" y1="${bg}" x2="${cx}" y2="${bg+20}" stroke="${lc}" stroke-width="2.5" stroke-linecap="round"/><line x1="${cx}" y1="${bg+20}" x2="${cx-10}" y2="${bg+36}" stroke="${lc}" stroke-width="2.5" stroke-linecap="round"/><line x1="${cx}" y1="${bg+20}" x2="${cx+10}" y2="${bg+36}" stroke="${lc}" stroke-width="2.5" stroke-linecap="round"/>`;}
function _svg(bg,inner){return `<svg viewBox="0 0 64 76" xmlns="http://www.w3.org/2000/svg"><rect width="64" height="76" fill="${bg}"/>${inner}</svg>`;}

const EX_POSES={
  // 등 - 랫풀다운 (와이드 풀)
  pull:bg=>_svg(bg,`<line x1="8" y1="10" x2="56" y2="10" stroke="#7AA4F0" stroke-width="3.5" stroke-linecap="round"/><line x1="18" y1="10" x2="32" y2="22" stroke="#5A7AAA" stroke-width="2.5" stroke-linecap="round"/><line x1="46" y1="10" x2="32" y2="22" stroke="#5A7AAA" stroke-width="2.5" stroke-linecap="round"/>${_face(32,29)}${_body(32,37,'#5A7AAA')}`),
  // 등 - 시티드로우 (앉아서 케이블 당기기)
  'row-s':bg=>_svg(bg,`${_face(22,20)}<line x1="22" y1="28" x2="34" y2="40" stroke="#5A7AAA" stroke-width="2.5" stroke-linecap="round"/><line x1="22" y1="32" x2="52" y2="28" stroke="#5A7AAA" stroke-width="2.5" stroke-linecap="round"/><line x1="22" y1="32" x2="52" y2="36" stroke="#5A7AAA" stroke-width="2.5" stroke-linecap="round"/><line x1="34" y1="40" x2="24" y2="60" stroke="#5A7AAA" stroke-width="2.5" stroke-linecap="round"/><line x1="34" y1="40" x2="44" y2="60" stroke="#5A7AAA" stroke-width="2.5" stroke-linecap="round"/><circle cx="56" cy="32" r="5" fill="#7AA4F0" stroke="#5A7AAA" stroke-width="1.5"/>`),
  // 등 - 벤트오버 로우 (상체 숙여 바 당기기)
  'row-b':bg=>_svg(bg,`${_face(14,16)}<line x1="14" y1="24" x2="46" y2="36" stroke="#5A7AAA" stroke-width="2.5" stroke-linecap="round"/><line x1="24" y1="26" x2="10" y2="14" stroke="#5A7AAA" stroke-width="2.5" stroke-linecap="round"/><line x1="24" y1="26" x2="50" y2="20" stroke="#5A7AAA" stroke-width="2.5" stroke-linecap="round"/><line x1="46" y1="36" x2="36" y2="58" stroke="#5A7AAA" stroke-width="2.5" stroke-linecap="round"/><line x1="46" y1="36" x2="56" y2="56" stroke="#5A7AAA" stroke-width="2.5" stroke-linecap="round"/><circle cx="52" cy="18" r="4" fill="#7AA4F0" stroke="#5A7AAA" stroke-width="1.5"/>`),
  // 등 - 원암 덤벨 로우 (한쪽 팔만)
  'row-1':bg=>_svg(bg,`${_face(18,14)}<line x1="18" y1="22" x2="44" y2="34" stroke="#5A7AAA" stroke-width="2.5" stroke-linecap="round"/><line x1="26" y1="24" x2="10" y2="36" stroke="#5A7AAA" stroke-width="2.5" stroke-linecap="round"/><line x1="26" y1="24" x2="52" y2="16" stroke="#5A7AAA" stroke-width="2.5" stroke-linecap="round"/><line x1="44" y1="34" x2="36" y2="56" stroke="#5A7AAA" stroke-width="2.5" stroke-linecap="round"/><line x1="44" y1="34" x2="54" y2="54" stroke="#5A7AAA" stroke-width="2.5" stroke-linecap="round"/><circle cx="54" cy="14" r="4" fill="#7AA4F0" stroke="#5A7AAA" stroke-width="1.5"/>`),
  // 등 - 풀업 (매달려 당기기)
  pullup:bg=>_svg(bg,`<line x1="8" y1="8" x2="56" y2="8" stroke="#7AA4F0" stroke-width="3.5" stroke-linecap="round"/><line x1="24" y1="8" x2="32" y2="18" stroke="#5A7AAA" stroke-width="2.5" stroke-linecap="round"/><line x1="40" y1="8" x2="32" y2="18" stroke="#5A7AAA" stroke-width="2.5" stroke-linecap="round"/>${_face(32,25)}<line x1="32" y1="33" x2="32" y2="50" stroke="#5A7AAA" stroke-width="2.5" stroke-linecap="round"/><line x1="32" y1="50" x2="22" y2="64" stroke="#5A7AAA" stroke-width="2.5" stroke-linecap="round"/><line x1="32" y1="50" x2="42" y2="64" stroke="#5A7AAA" stroke-width="2.5" stroke-linecap="round"/>`),
  // 가슴 - 벤치프레스 (누워서 바 올리기)
  bench:bg=>_svg(bg,`<line x1="6" y1="32" x2="58" y2="32" stroke="#F4A0BC" stroke-width="3.5" stroke-linecap="round"/>${_face(32,14)}<line x1="32" y1="22" x2="32" y2="46" stroke="#E880A0" stroke-width="2.5" stroke-linecap="round"/><line x1="6" y1="46" x2="58" y2="46" stroke="#E880A0" stroke-width="2.5" stroke-linecap="round"/><line x1="18" y1="22" x2="8" y2="32" stroke="#E880A0" stroke-width="2.5" stroke-linecap="round"/><line x1="46" y1="22" x2="56" y2="32" stroke="#E880A0" stroke-width="2.5" stroke-linecap="round"/><line x1="32" y1="46" x2="24" y2="64" stroke="#E880A0" stroke-width="2.5" stroke-linecap="round"/><line x1="32" y1="46" x2="40" y2="64" stroke="#E880A0" stroke-width="2.5" stroke-linecap="round"/>`),
  // 가슴 - 펙덱 플라이 (팔 모으기)

// 운동명 → 부위 탐색
function _exPartOf(name){
  for(const[p,list]of Object.entries(PART_EX)){if(list.includes(name))return p;}
  for(const[p,cp]of Object.entries(customParts)){if((cp.exercises||[]).some(e=>(e.name||e)===name))return p;}
  return '등';
}
// 운동명 → {bg, svg} 일러스트 반환
function getExIllust(name){
  const pose=EX_POSE_OVERRIDE[name];
  if(pose&&EX_POSES[pose]){
    const part=_exPartOf(name);
    const bg=(PART_ILLUST[part]||PART_ILLUST['등']).bg;
    return {bg,svg:EX_POSES[pose](bg)};
  }
  const part=_exPartOf(name);
  const pi=PART_ILLUST[part]||PART_ILLUST['등'];
  return {bg:pi.bg,svg:EX_POSES[pi.pose](pi.bg)};
}

  try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(r*299+g*587+b*114)/1000>155;}catch(e){return false;}
}

function mergeSheetData(sheetData){
  let changed=false;
  Object.entries(sheetData||{}).forEach(([k,v])=>{
    if(!k||k==='undefined'||!v||typeof v!=='object')return;
    if(!data[k]){
      data[k]=v;changed=true;return;
    }
    const remoteTs=parseInt(v.ts)||0;
    const localTs=parseInt(data[k].ts)||0;
    if(remoteTs&&remoteTs>localTs){
      data[k]=v;changed=true;
    }
  });
  if(changed)localStorage.setItem(HC_STORE_KEY,JSON.stringify(data));
  return changed;
}
async function fetchSheetData(){
  const ctrl=typeof AbortController!=='undefined'?new AbortController():null;
  const timer=ctrl?setTimeout(()=>ctrl.abort(),GS_TIMEOUT_MS):null;
  try{
    const url=GS_URL+(GS_URL.includes('?')?'&':'?')+'t='+Date.now();
    const res=await fetch(url,{method:'GET',cache:'no-store',redirect:'follow',signal:ctrl?.signal});
    const text=await res.text();
    if(!res.ok)throw new Error('sheet_http_'+res.status);
    const json=JSON.parse(text);
    return json?.data||{};
  }finally{
    if(timer)clearTimeout(timer);
  }
}

function getBestPart(targetDate){
  const sorted=Object.keys(data).sort().reverse();
  const lastTrained={};
  sorted.forEach(key=>{
    const diff=Math.floor((targetDate-new Date(key))/86400000);
    if(diff<0)return;
    (data[key].parts||[]).forEach(p=>{if(lastTrained[p]===undefined)lastTrained[p]=diff;});
  });
  const parts=['등','가슴','어깨','하체','코어','팔'];
  return parts.sort((a,b)=>(lastTrained[b]??9999)-(lastTrained[a]??9999))[0]||'등';
}

function formatSetSummary(sets){
  if(!sets||!sets.length)return '';
  return sets.map((set)=>{
    const minutes=set.m||set.min||set.minutes||set.duration;
    if(minutes)return `${minutes}분`;
    // 혹시 w에 '5.20.3' 형태로 저장됐으면 재파싱
    let {w,r,s}=set;
    if(w&&String(w).includes('.')&&!r){
      const p=String(w).split('.');
      w=p[0]||'';r=p[1]||'';s=parseInt(p[2])||s||1;
    }
    let txt='';
    if(w)txt+=w+(String(w).includes('kg')?'':'kg');
    if(r)txt+=(txt?' ':'')+r+(String(r).includes('개')||String(r).includes('회')?'':'회');
    if(txt&&s)txt+=` × ${s}세트`;
    return txt.trim();
  }).filter(Boolean).join(' / ');
}

function makeSetInpRow(name, setsArr, onChange){
  const wrap=document.createElement('div');wrap.className='ex-sets-mr';
  wrap.dataset.exercise=name;
  wrap.dataset.kind='strength';
  const hd=document.createElement('div');hd.className='ex-sets-mr-hd';

  hd.appendChild(nm);hd.appendChild(closeBtn);wrap.appendChild(hd);
  // 기본 4세트 확보
  while(setsArr.length<4)setsArr.push({w:'',r:'',s:1});
  const grid=document.createElement('div');grid.className='ex-sets-grid';
  function setToVal(set){
    let {w,r,s}=set;
    // 이전 형식으로 w에 '2.20.2' 처럼 저장됐으면 재파싱
    const dots=w?(String(w).match(/\./g)||[]).length:0;
    if(dots>=2&&!r){const p=String(w).split('.');w=p[0]||'';r=p[1]||'';s=parseInt(p[2])||s||1;}
    if(!w&&!r&&!(s>1))return '';
    return [w||'',r||'',s>1?s:1].join('.');
  }
  function renderCells(){
    grid.innerHTML='';
    setsArr.forEach((set,i)=>{
      const cell=document.createElement('div');cell.className='ex-set-cell';
      const num=document.createElement('span');num.className='ex-set-num';num.textContent=i+1;
      const inp=document.createElement('input');

      inp.style.flex='1';inp.style.textAlign='left';
      inp.setAttribute('autocorrect','off');
      inp.setAttribute('autocapitalize','none');
      inp.setAttribute('spellcheck','false');
      inp.value=setToVal(set);inp.placeholder='kg.회.세트';
      const empty=!set.w&&!set.r&&!(set.s>1);
      cell.classList.toggle('empty',empty);
      const handleInp=()=>{
        parseSetValue(inp.value,set);
        cell.classList.toggle('empty',!set.w&&!set.r&&!(set.s>1));
        if(onChange)onChange();
      };
      inp.addEventListener('input',handleInp);
      inp.addEventListener('change',handleInp); // iOS blur fallback
      inp.onfocus=()=>inp.select();
      cell.appendChild(num);cell.appendChild(inp);
      grid.appendChild(cell);
    });
  }
  renderCells();
  wrap.appendChild(grid);
  const btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:6px;margin-top:2px';
  const addBtn=document.createElement('button');addBtn.className='ex-sets-add';
  addBtn.style.flex='1';
  addBtn.textContent='+ 2세트 추가';
  addBtn.onclick=()=>{
    setsArr.push({w:'',r:'',s:1},{w:'',r:'',s:1});
    renderCells();if(onChange)onChange();
  };
  const delBtn=document.createElement('button');delBtn.className='ex-sets-add';
  delBtn.style.cssText='flex:1;color:var(--text-3);border-color:var(--line-strong)';
  delBtn.textContent='− 2세트 삭제';
  delBtn.onclick=()=>{
    if(setsArr.length>2){setsArr.splice(-2,2);renderCells();if(onChange)onChange();}
  };
  btnRow.appendChild(addBtn);btnRow.appendChild(delBtn);
  wrap.appendChild(btnRow);
  return wrap;
}

/* ── Exercise Search ── */
function buildExPart(){
  const map={};
  Object.entries(PART_EX).forEach(([part,list])=>{list.forEach(ex=>{if(!map[ex])map[ex]=part;});});
  return map;
}
function getPartExercises(part, query=''){
  const q=query.trim();
  const seen=new Set();
  return (PART_EX[part]||[]).filter(name=>{
    if(seen.has(name))return false;
    seen.add(name);
    return matchesExerciseSearch(name,q);
  });
}
function pruneModalSelections(){
  const partMap=buildExPart();
  [...selExercises].forEach(name=>{
    const p=partMap[name];
    if(!p||!selParts.has(p)){
      selExercises.delete(name);
      delete perExSets[name];
    }
  });
  if(!selParts.size){
    selExercises.clear();
    perExSets={};
  }
}

function searchEx(q){
  const results=document.getElementById('exSearchResults');
  if(!q.trim()){results.classList.add('hidden');results.innerHTML='';return;}
  const map=buildExPart();
  const matches=Object.keys(map).filter(name=>matchesExerciseSearch(name,q));

  if(!matches.length){
    results.innerHTML='<div class="ex-search-empty">검색 결과 없음</div>';

/* ── Calendar ── */
function getEntryDominantPart(entry){
  const partMap=buildExPart();
  const counts={};
  (entry.exercises||[]).forEach(name=>{
    const part=partMap[name]||(entry.parts||[]).find(p=>PARTS[p]);
    if(part&&PARTS[part])counts[part]=(counts[part]||0)+1;
  });
  const partOrder=(entry.parts||[]).filter(p=>PARTS[p]);
  partOrder.forEach(p=>{if(!counts[p])counts[p]=0;});
  return Object.keys(counts).sort((a,b)=>{
    const diff=(counts[b]||0)-(counts[a]||0);
    if(diff)return diff;
    const ai=partOrder.indexOf(a),bi=partOrder.indexOf(b);
    return (ai<0?999:ai)-(bi<0?999:bi);
  })[0]||partOrder[0]||'등';
}

function renderCal(){
  const grid=document.getElementById('calGrid');
  while(grid.children.length>7)grid.removeChild(grid.lastChild);

  const tk=todayDk();
  for(let i=0;i<firstDay;i++){const e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e);}
  for(let d=1;d<=lastDay;d++){
    const key=dk(curY,curM,d);
    const dow=new Date(curY,curM,d).getDay();
    const entry=data[key];
    const sched=getSchedule(key);
    const cell=document.createElement('div');
    cell.className='cal-day'
      +(key===tk?' is-today':'')
      +(dow===0?' is-sun':dow===6?' is-sat':'')
      +(!entry&&sched==='근력'&&key!==tk?' is-plan':'')
      +(!entry&&sched==='유산소'&&key!==tk?' is-plan-cardio':'');
    cell.onclick=()=>{if(data[key])openView(key,d);else openModal(key,d);};
    const num=document.createElement('div');num.className='dn2';num.textContent=d;cell.appendChild(num);
    if(!entry&&sched&&key!==tk){
      const pl=document.createElement('div');pl.className='plan-lbl';
      pl.textContent=sched==='근력'?'근력':'유산소';cell.appendChild(pl);
    }
    if(entry){
      if(entry.parts?.length&&entry.parts[0]!=='휴식'){
        cell.classList.add('has-entry');
        const dominantPart=getEntryDominantPart(entry);
        const bgColor=PARTS[dominantPart]?.color||'#DDF77A';
        cell.style.background=bgColor;
        num.style.color='#fff';
        const otherParts=[...new Set((entry.parts||[]).filter(p=>p!==dominantPart&&PARTS[p]))];
        const lbl=document.createElement('div');
        lbl.style.cssText='font-size:.72rem;font-weight:800;margin-top:2px;line-height:1;opacity:.9;color:#fff';
        lbl.textContent=dominantPart;cell.appendChild(lbl);
        if(otherParts.length){
          const bars=document.createElement('div');bars.className='cal-bars';
          otherParts.slice(0,2).forEach(p=>{
            const b=document.createElement('i');b.style.background=PARTS[p].color;
            bars.appendChild(b);
          });
          cell.appendChild(bars);
        }
      } else if(entry.parts?.[0]==='휴식'){
        cell.classList.add('has-rest');
        const pl=document.createElement('div');pl.className='plan-lbl';pl.textContent='휴식';cell.appendChild(pl);
      }
    }
    grid.appendChild(cell);
  }
}

function changeMonth(dir){
  if(dir===0){curY=today.getFullYear();curM=today.getMonth();}
  else{curM+=dir;if(curM<0){curM=11;curY--;}if(curM>11){curM=0;curY++;}}
  renderCal();
}

/* ── Stats ── */
function shiftStats(dir){statsOffset+=dir;updateStats();}
function updateStats(){
  const c=document.getElementById('statsMonths');c.innerHTML='';
  for(let i=-1;i<=1;i++){
    const mOffset=statsOffset+i;
    const d=new Date(today.getFullYear(),today.getMonth()+mOffset,1);
    const y=d.getFullYear();const m=d.getMonth();
    const px=`${y}-${String(m+1).padStart(2,'0')}`;
    const keys=Object.keys(data).filter(k=>k.startsWith(px)&&data[k].parts?.[0]!=='휴식');
    const total=keys.length;
    const isNow=(mOffset===0);

    // Count per part
    const partCount={};
    keys.forEach(k=>{(data[k].parts||[]).forEach(p=>{if(PARTS[p])partCount[p]=(partCount[p]||0)+1;});});
    const partRows=Object.entries(partCount).sort((a,b)=>b[1]-a[1])
      .map(([p,cnt])=>`<div class="stat-part-row"><span class="stat-part-dot" style="background:${PARTS[p].color}"></span><span class="stat-part-name">${p}</span><span class="stat-part-cnt">${cnt}</span></div>`).join('');

    const box=document.createElement('div');
    box.className='stat-month'+(isNow?' current':'');
    box.innerHTML=`<div class="stat-m-name">${y}년 ${MONTH_KR[m]}</div>
      <div class="stat-m-num">${total}<span class="stat-m-unit">회</span></div>
      <div class="stat-parts">${partRows}</div>`;
    c.appendChild(box);
  }
  const totalCount=Object.values(data).filter(v=>v.parts?.[0]!=='휴식').length;
  document.getElementById('streakBadge').textContent=`💪 총 ${totalCount}회 운동`;
}

/* ── Log Modal ── */
/* ── 달력 뷰 모달 (읽기 전용) ── */
let viewKey=null,viewD=null;

function openView(key,d){
  viewKey=key;viewD=d;
  const entry=data[key];
  const mIdx=parseInt(key.split('-')[1])-1;
  const yIdx=parseInt(key.split('-')[0]);
  document.getElementById('viewTitle').textContent=`${yIdx}년 ${MONTH_KR[mIdx]} ${d}일`;
  const c=document.getElementById('viewContent');c.innerHTML='';

  // 완료/부위 뱃지
  const badgeRow=document.createElement('div');badgeRow.style.marginBottom='4px';
  if(entry.done){
    const done=document.createElement('span');done.className='view-done';
    done.textContent='🎉 완료';badgeRow.appendChild(done);
  }
  (entry.parts||[]).forEach(p=>{
    if(p==='휴식'){
      const r=document.createElement('span');r.className='view-rest';r.textContent='😴 휴식일';badgeRow.appendChild(r);
    } else if(PARTS[p]){
      const b=document.createElement('span');b.className='view-part-badge';
      b.style.background=PARTS[p].color;b.textContent=p;badgeRow.appendChild(b);
    }
  });
  c.appendChild(badgeRow);

  // 운동 목록
  const exercises=entry.exercises||[];
  const setsInfo=entry.sets_info||{};
  if(exercises.length){
    const exHd=document.createElement('div');exHd.className='field-lbl';exHd.textContent='운동 목록';c.appendChild(exHd);
    const partMap=buildExPart();
    let rendered=false;
    (entry.parts||[]).filter(p=>p!=='휴식').forEach(part=>{
      const partExercises=exercises.filter(name=>partMap[name]===part);
      if(!partExercises.length)return;
      if(rendered){
        const hr=document.createElement('hr');hr.className='rec-part-divider';
        c.appendChild(hr);
      }
      rendered=true;
      const hd=document.createElement('div');hd.className='rec-part-hd';
      const dot=document.createElement('span');dot.className='dot';
      dot.style.background=PARTS[part]?.color||'#888';
      const lbl=document.createElement('span');
      lbl.textContent=part;lbl.style.color=PARTS[part]?.color||'';
      hd.appendChild(dot);hd.appendChild(lbl);c.appendChild(hd);

      const exScroll=document.createElement('div');
      exScroll.className='ex-list-scroll view-ex-list-full';
      c.appendChild(exScroll);
      partExercises.forEach(name=>{
        const row=document.createElement('div');row.className='view-ex-row';
        const nm=document.createElement('div');nm.className='view-ex-name';
        const setText=formatSetSummary(setsInfo[name]);
        nm.textContent=name;
        row.appendChild(nm);
        if(setText){const sv=document.createElement('div');sv.className='view-ex-sets-inline';sv.textContent=setText;row.appendChild(sv);}
        exScroll.appendChild(row);
      });
    });
    const uncategorized=exercises.filter(name=>!(entry.parts||[]).some(p=>partMap[name]===p));
    if(uncategorized.length){
      if(rendered){
        const hr=document.createElement('hr');hr.className='rec-part-divider';
        c.appendChild(hr);
      }
      const hd=document.createElement('div');hd.className='rec-part-hd';
      const dot=document.createElement('span');dot.className='dot';
      dot.style.background='var(--text-3)';
      const lbl=document.createElement('span');lbl.textContent='기타';
      hd.appendChild(dot);hd.appendChild(lbl);c.appendChild(hd);
      const exScroll=document.createElement('div');
      exScroll.className='ex-list-scroll view-ex-list-full';
      c.appendChild(exScroll);
      uncategorized.forEach(name=>{
        const row=document.createElement('div');row.className='view-ex-row';
        const nm=document.createElement('div');nm.className='view-ex-name';
        const setText=formatSetSummary(setsInfo[name]);
        nm.textContent=name;
        row.appendChild(nm);
        if(setText){const sv=document.createElement('div');sv.className='view-ex-sets-inline';sv.textContent=setText;row.appendChild(sv);}
        exScroll.appendChild(row);
      });
    }
  } else if((entry.parts||[]).includes('휴식')){
    // 휴식일 표시
  } else {
    const empty=document.createElement('div');
    empty.style.cssText='font-size:.82rem;color:var(--text-3);padding:6px 0';
    empty.textContent='운동 목록 없음';c.appendChild(empty);
  }

  // 메모
  if(entry.custom){
    const mHd=document.createElement('div');mHd.className='field-lbl';mHd.style.marginTop='10px';mHd.textContent='메모';c.appendChild(mHd);
    const memo=document.createElement('div');memo.style.cssText='font-size:.86rem;color:var(--text-2);padding:12px 14px;background:#ececea;border-radius:16px;border:none;font-weight:600;line-height:1.6';
    memo.textContent=entry.custom;c.appendChild(memo);
  }

  document.getElementById('viewOverlay').classList.remove('hidden');
  document.body.style.overflow='hidden';

function hideView(){
  document.getElementById('viewOverlay').classList.add('hidden');
  document.body.style.overflow='';viewKey=null;viewD=null;
}

function switchToEdit(){
  const k=viewKey,day=viewD;
  hideView();
  if(k!==null)openModal(k,day);
}

function findPrevWorkoutEntry(targetKey){
  const entries=Object.entries(data)
    .filter(([k,v])=>k<targetKey&&v?.exercises?.length)
    .sort(([a],[b])=>b.localeCompare(a));
  return entries.length?entries[0]:null;
}

function copySetsInfo(src){
  const copied={};
  Object.entries(src||{}).forEach(([k,v])=>{
    copied[k]=Array.isArray(v)
      ? v.map(s=>({...s}))
      : [{m:v.m||v.min||v.minutes||v.duration||'',w:v.w||v.weight||'',r:v.r||v.reps||'',s:parseInt(v.s||v.sets)||1}];
  });
  return copied;
}

function renderModalPrevLoader(targetKey){
  const mount=document.getElementById('modalPrevLoad');
  if(!mount)return;
  mount.innerHTML='';
  const prevEntry=findPrevWorkoutEntry(targetKey);
  if(!prevEntry){
    const empty=document.createElement('div');
    empty.className='prev-load-empty';
    empty.textContent='불러올 이전 운동 기록이 없어요';
    mount.appendChild(empty);
    return;
  }
  const [prevKey,prev]=prevEntry;
  const d=new Date(prevKey+'T00:00:00');
  const label=`📋 ${d.getMonth()+1}/${d.getDate()} ${(prev.parts||[]).join('+')} 불러오기`;
  const btn=document.createElement('button');
  btn.className='prev-load-btn';
  btn.textContent=label;
  btn.onclick=()=>{
    selParts=new Set((prev.parts||[]).filter(p=>PARTS[p]));
    selExercises=new Set(prev.exercises||[]);
    perExSets=copySetsInfo(prev.sets_info);
    document.getElementById('doneToggle').checked=true;
    document.getElementById('exSearch').value='';
    const results=document.getElementById('exSearchResults');
    results.classList.add('hidden');results.innerHTML='';
    renderPartBtns();renderExGrid();
    btn.textContent='불러오기 완료 ✓';
    btn.classList.add('loaded');
    setTimeout(()=>{btn.textContent=label;btn.classList.remove('loaded');},2000);
  };
  mount.appendChild(btn);
}

function openModal(key,d){
  selDate=key;selParts=new Set();
  const entry=data[key];
  const dow=new Date(key).getDay();
  const mIdx=parseInt(key.split('-')[1])-1;
  const yIdx=parseInt(key.split('-')[0]);
  document.getElementById('modalTitle').textContent=`📝 ${yIdx}년 ${MONTH_KR[mIdx]} ${d}일`;
  document.getElementById('custInp').value=entry?.custom||'';
  document.getElementById('doneToggle').checked=true;
  document.getElementById('btnDel').classList.toggle('hidden',!entry);
  selExercises=new Set(entry?.exercises||[]);
  if(entry?.parts)entry.parts.forEach(p=>selParts.add(p));
  // 기존 데이터 → [{w,r,s}] 배열로 마이그레이션
  const raw=entry?.sets_info||{};
  perExSets={};
  Object.entries(raw).forEach(([k,v])=>{
    if(Array.isArray(v))perExSets[k]=v;
    else if(v&&(v.m||v.min||v.minutes||v.duration||v.w||v.weight))
      perExSets[k]=[{m:v.m||v.min||v.minutes||v.duration||'',w:v.w||v.weight||'',r:v.r||v.reps||'',s:parseInt(v.s||v.sets)||1}];
  });
  document.getElementById('exSearch').value='';
  document.getElementById('exSearchResults').classList.add('hidden');
  document.getElementById('exSetsList').innerHTML='';
  renderModalPrevLoader(key);
  renderPartBtns();renderExGrid();
  document.getElementById('overlay').classList.remove('hidden');
  document.body.style.overflow='hidden';
}

function renderPartBtns(){
  const c=document.getElementById('partBtns');c.innerHTML='';
  Object.entries(PARTS).forEach(([name,{color}])=>{
    const btn=document.createElement('button');
    btn.className='part-btn'+(selParts.has(name)?' on':'');
    btn.textContent=name;
    if(selParts.has(name)){btn.style.background=color;btn.style.color='#fff';btn.style.borderColor=color;}
    btn.onclick=()=>{
      selParts.has(name)?selParts.delete(name):selParts.add(name);
      pruneModalSelections();
      const q=document.getElementById('exSearch');
      if(q)q.value='';
      const results=document.getElementById('exSearchResults');
      if(results){results.classList.add('hidden');results.innerHTML='';}
      renderPartBtns();renderExGrid();
      if(selParts.has(name)){
        // 운동 목록이 화면에 보이도록 스크롤
        setTimeout(()=>{
          const modal=document.querySelector('#overlay .modal');
          const ec=document.getElementById('exContainer');
          if(modal&&ec){modal.scrollTop=ec.offsetTop-50;}
        },60);
      }
    };
    c.appendChild(btn);
  });
  // "+ 부위 추가" button
  const addBtn=document.createElement('button');
  addBtn.className='part-btn';
  addBtn.style.cssText='border-style:dashed;color:#5A5F52;border-color:#C8CEB8;background:#ececea';
  addBtn.textContent='+ 추가';
  addBtn.onclick=()=>showAddPart();
  c.appendChild(addBtn);
}

function renderExGrid(){
  const c=document.getElementById('exContainer');c.innerHTML='';
  modalPartSetsContainers={};
  document.getElementById('exSetsList').innerHTML='';
  pruneModalSelections();
  const hasCustomPart=[...selParts].some(p=>customParts[p]);
  if(!selParts.size){
    c.innerHTML='<div class="ex-empty">부위를 선택하면 목록이 표시됩니다</div>';
    return;
  }
  let rendered=false;
  [...selParts].forEach((part,idx)=>{
    const list=getPartExercises(part);
    if(!list.length)return;
    if(rendered){
      const hr=document.createElement('hr');hr.className='rec-part-divider';
      c.appendChild(hr);
    }
    rendered=true;
    const hd=document.createElement('div');hd.className='rec-part-hd';
    const dot=document.createElement('span');dot.className='dot';
    dot.style.background=PARTS[part]?.color||'#888';
    const lbl=document.createElement('span');
    lbl.textContent=part;
    lbl.style.color=PARTS[part]?.color||'';
    hd.appendChild(dot);hd.appendChild(lbl);
    c.appendChild(hd);

    const scroll=document.createElement('div');
    scroll.className='ex-list-scroll rec-ex-list-scroll';
    list.forEach(name=>scroll.appendChild(makeModalExRow(name,part)));
    c.appendChild(scroll);

    const sets=document.createElement('div');
    modalPartSetsContainers[part]=sets;
    c.appendChild(sets);
    updateModalSetsFor(part);
  });
  if(!rendered){
    c.innerHTML='<div class="ex-empty">선택한 부위에 등록된 운동이 없습니다</div>';
  }
  if(hasCustomPart){
    const addBtn=document.createElement('button');addBtn.className='btn btn-ghost';
    addBtn.style.cssText='width:100%;margin-top:6px;font-size:.82rem';
    addBtn.textContent='+ 운동 추가';addBtn.onclick=()=>showAddEx();c.appendChild(addBtn);
  }
}

function saveEntry(){
  pruneModalSelections();
  const cleanSets={};
  [...selExercises].forEach(name=>{
    if(perExSets[name])cleanSets[name]=perExSets[name];
  });
  data[selDate]={
    parts:[...selParts],exercises:[...selExercises],
    custom:document.getElementById('custInp').value.trim(),
    done:document.getElementById('doneToggle').checked,
    sets_info:cleanSets,
    ts:Date.now()
  };
  persist();hideModal();renderCal();updateRec();updateStats();
}
function deleteEntry(){if(!confirm('삭제할까요?'))return;delete data[selDate];persist();hideModal();renderCal();updateRec();updateStats();}
function hideModal(){document.getElementById('overlay').classList.add('hidden');document.body.style.overflow='';selDate=null;}
function overlayClick(e){if(e.target===document.getElementById('overlay'))hideModal();}

/* ── 운동 정보 관리 ── */
let customExercises=JSON.parse(localStorage.getItem('hcCustomEx')||'{}');
let hiddenExercises=new Set(JSON.parse(localStorage.getItem('hcHiddenEx')||'[]'));
let exMgmtEditMode=false;

function toggleExMgmtEdit(){
  exMgmtEditMode=!exMgmtEditMode;
  const btn=document.getElementById('exMgmtEditBtn');
  if(btn){
    btn.textContent=exMgmtEditMode?'완료':'편집';
    btn.classList.toggle('editing',exMgmtEditMode);
    btn.style.background=exMgmtEditMode?'var(--btn-bg)':'var(--surface)';
    btn.style.color=exMgmtEditMode?'var(--btn-text)':'var(--text)';
    btn.style.borderColor=exMgmtEditMode?'transparent':'var(--line-strong)';
  }
  renderExMgmt();
}

function deleteExercise(name){
  const isCustom=!!customExercises[name];
  if(isCustom){
    const p=customExercises[name]?.part;
    delete customExercises[name];
    localStorage.setItem('hcCustomEx',JSON.stringify(customExercises));
    if(p&&PART_EX[p])PART_EX[p]=PART_EX[p].filter(n=>n!==name);
  } else {
    // 기본 운동은 숨기기
    hiddenExercises.add(name);
    localStorage.setItem('hcHiddenEx',JSON.stringify([...hiddenExercises]));
    Object.keys(PART_EX).forEach(p=>{PART_EX[p]=PART_EX[p].filter(n=>n!==name);});
  }
  renderExMgmt();
}

(function(){
  // 숨겨진 운동 제거
  hiddenExercises.forEach(name=>{
    Object.keys(PART_EX).forEach(p=>{PART_EX[p]=PART_EX[p].filter(n=>n!==name);});
  });
  // 커스텀 운동 추가
  Object.entries(customExercises).forEach(([name,{part}])=>{
    if(!PART_EX[part])PART_EX[part]=[];
    if(!PART_EX[part].includes(name))PART_EX[part].push(name);
    if(!EX_YT[name])EX_YT[name]=name+' 운동법';
  });
  const sel=document.getElementById('exMgmtPart');
  if(sel){
    Object.keys(PARTS).forEach(p=>{
      const o=document.createElement('option');o.value=p;o.textContent=p;sel.appendChild(o);
    });
  }
  renderExMgmt();
})();

function renderExMgmt(){
  const q=(document.getElementById('exMgmtSearch')?.value||'').trim();
  const list=document.getElementById('exMgmtList');
  if(!list)return;
  list.innerHTML='';
  if(!q&&!exMgmtEditMode)return;
  const allEx=[];
  Object.entries(PART_EX).forEach(([part,exs])=>{
    exs.forEach(name=>{
      if(matchesExerciseSearch(name,q))allEx.push({name,part,isCustom:!!customExercises[name]});
    });
  });
  if(!allEx.length&&q){
    const e=document.createElement('div');
    e.style.cssText='font-size:.82rem;color:var(--text-3);padding:8px 0';
    e.textContent='검색 결과 없음';list.appendChild(e);return;
  }
  allEx.slice(0,30).forEach(({name,part,isCustom})=>{
    const row=document.createElement('div');row.className='ex-mgmt-row';
    if(exMgmtEditMode)row.style.borderColor='var(--line-strong)';
    const nm=document.createElement('span');nm.className='ex-mgmt-name';nm.textContent=name;
    if(isFrequentExercise(name)){
      nm.appendChild(document.createTextNode(' '));
      const fb=document.createElement('span');fb.textContent='🔥';fb.style.cssText='font-size:.85rem';
      nm.appendChild(fb);
    }
    const badge=document.createElement('span');badge.className='ex-mgmt-part';
    badge.textContent=part;badge.style.background=PARTS[part]?.color||'#888';
    row.appendChild(nm);row.appendChild(badge);
    if(exMgmtEditMode){
      const del=document.createElement('button');
      del.style.cssText='background:none;border:none;cursor:pointer;font-size:1.1rem;padding:2px 4px;flex-shrink:0;line-height:1';
      del.textContent='−';
      del.style.color='var(--red)';
      del.onclick=()=>deleteExercise(name);
      row.appendChild(del);
    }
    list.appendChild(row);
  });
  // 편집 모드에서 숨김 운동 복원 버튼 표시
  if(exMgmtEditMode&&hiddenExercises.size>0){
    const restore=document.createElement('button');
    restore.style.cssText='width:100%;margin-top:8px;padding:9px;border-radius:10px;border:1.5px dashed var(--line-strong);background:none;color:var(--text-2);font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit';
    restore.textContent=`숨긴 운동 복원 (${hiddenExercises.size}개)`;
    restore.onclick=()=>{
      hiddenExercises.forEach(name=>{
        const origPart=Object.keys(PART_EX).find(p=>EX_YT[name])||null;
        // EX_YT에서 부위 추정은 어려우므로 그냥 전체 원본 목록에서 복원
        // 단순히 hidden 목록만 지움
      });
      hiddenExercises.clear();
      localStorage.removeItem('hcHiddenEx');
      location.reload(); // 페이지 새로고침으로 원본 복원
    };
    list.appendChild(restore);
  }
}

function addCustomEx(){
  const nameEl=document.getElementById('exMgmtName');
  const partEl=document.getElementById('exMgmtPart');
  const name=nameEl?.value.trim();
  const part=partEl?.value;
  if(!name||!part)return;
  if(customExercises[name]){alert('이미 존재하는 운동입니다.');return;}
  customExercises[name]={part};
  if(!PART_EX[part])PART_EX[part]=[];
  if(!PART_EX[part].includes(name))PART_EX[part].push(name);
  EX_YT[name]=name+' 운동법';
  localStorage.setItem('hcCustomEx',JSON.stringify(customExercises));
  if(nameEl)nameEl.value='';
  renderExMgmt();
}

(async function initApp(){
  renderCal();updateRec();updateStats();updateLegend();
  try{
    const sheetData=await fetchSheetData();
    if(hasWorkoutData(sheetData)){
      // 시트 데이터와 로컬 데이터 병합 (더 최근 기록 우선)
      const changed=mergeSheetData(sheetData);
      if(changed){renderCal();updateRec();updateStats();updateLegend();}
    } else if(hasWorkoutData(data)){
      // 시트가 비어있고 로컬에 데이터 있으면 → 시트에 업로드
      uploadSheetData().catch(()=>{});
    }
    window.__hcLastSyncError='';
  }catch(e){
    window.__hcLastSyncError=String(e&&e.message||e);
  }
})();
